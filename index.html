<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Off-canvas Menu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button class="open-btn" id="openMenu">☰ Відкрити меню</button>

    <div class="off-canvas-menu" id="sideMenu">
      <button class="close-btn" id="closeMenu">&times;</button>

      <nav class="menu-content">
        <h2>Навігація</h2>
        <ul>
          <li><a href="#">Профіль</a></li>
          <li><a href="#">Повідомлення</a></li>
          <li><a href="#">Налаштування</a></li>
          <li><a href="#">Вихід</a></li>
        </ul>
      </nav>
    </div>

    <script>
      const menu = document.getElementById("sideMenu");
      const openBtn = document.getElementById("openMenu");
      const closeBtn = document.getElementById("closeMenu");

      openBtn.onclick = () => menu.classList.add("active");
      closeBtn.onclick = () => menu.classList.remove("active");
    </script>
  </body>
</html>
